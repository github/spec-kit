schema_version: "1.0"

extension:
  id: ai-team
  name: "AI Team SDD Collaboration"
  version: "0.1.0"
  description: "Enterprise AI Team workflow for Spec-Driven Development with role-isolated handoffs, public coding issue/internal enhancement boundaries, build-from-zero planning, self-test evidence, failure evolution, and three-tier memory consolidation."
  author: AI Team Template
  repository: https://github.com/EuphoriaYan/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.12.4"
  commands:
    - speckit.specify
    - speckit.plan
    - speckit.tasks
    - speckit.analyze
    - speckit.implement
    - speckit.converge

provides:
  commands:
    - name: speckit.ai-team.workspace
      file: commands/speckit.ai-team.workspace.md
      description: "Create or update the AI Team workspace contract for coding repository and internal enhancement boundaries."
    - name: speckit.ai-team.start
      file: commands/speckit.ai-team.start.md
      description: "Thin chat entry that routes resume, anchored work, or unanchored Intake without performing the routed phase."
    - name: speckit.ai-team.intake
      file: commands/speckit.ai-team.intake.md
      description: "Classify an unanchored request and produce read-only impact evidence plus an Issue draft; workflow owns publication and routing."
    - name: speckit.ai-team.context
      file: commands/speckit.ai-team.context.md
      description: "Open, update, or reconstruct formal work context after a stable Issue, charter, or handoff exists."
    - name: speckit.ai-team.permissions
      file: commands/speckit.ai-team.permissions.md
      description: "Create or verify an Intake or formal-work Permission Envelope and report its real enforcement level."
    - name: speckit.ai-team.requirement
      file: commands/speckit.ai-team.requirement.md
      description: "Create or refine internal enhancement context and sanitized handoff requirements for confidential feature work."
    - name: speckit.ai-team.codegraph
      file: commands/speckit.ai-team.codegraph.md
      description: "Generate or attach the code graph slice used by impact analysis, plan checks, task gates, and evidence."
    - name: speckit.ai-team.impact
      file: commands/speckit.ai-team.impact.md
      description: "Produce code graph or source-structure impact evidence before source edits."
    - name: speckit.ai-team.plan-check
      file: commands/speckit.ai-team.plan-check.md
      description: "Assess plan readiness for task generation; chat report only."
    - name: speckit.ai-team.handoff
      file: commands/speckit.ai-team.handoff.md
      description: "Create role-isolated SDD handoff records between specify, plan, tasks, and implementation roles."
    - name: speckit.ai-team.handoff-spec-sync
      file: commands/speckit.ai-team.handoff-spec-sync.md
      description: "Fetch handoff requirement URL and build gitignored spec.override.md before planning."
    - name: speckit.ai-team.feature-review
      file: commands/speckit.ai-team.feature-review.md
      description: "Own the human Feature acceptance assessment for maintainers and the Technical Committee."
    - name: speckit.ai-team.pr
      file: commands/speckit.ai-team.pr.md
      description: "Prepare a pull request in the correct repository with linked work item and evidence."
    - name: speckit.ai-team.review
      file: commands/speckit.ai-team.review.md
      description: "Help human reviewers assess PR architecture fit, boundary safety, evidence, and merge readiness."
    - name: speckit.ai-team.retrospect
      file: commands/speckit.ai-team.retrospect.md
      description: "Convert failed PRs, checks, incidents, or repeated AI mistakes into durable process improvements."
    - name: speckit.ai-team.memory-consolidate
      file: commands/speckit.ai-team.memory-consolidate.md
      description: "Consolidate contributor, department, or enterprise memory from completed AI Team work."
    - name: speckit.ai-team.release-archive
      file: commands/speckit.ai-team.release-archive.md
      description: "Run release-scoped memory consolidation and distill reusable feature, bugfix, migration, and operations knowledge."
    - name: speckit.ai-team.support
      file: commands/speckit.ai-team.support.md
      description: "Audit and maintain the external Skill, Knowledge, and Memory support layers for AI Team SDD work."

  config:
    - name: ai-team-config.yml
      template: config-template.yml
      description: "AI Team repository roles, privacy boundaries, role isolation, and evidence settings."
      required: false

hooks:
  before_plan:
    command: speckit.ai-team.handoff-spec-sync
    priority: 5
    optional: false
    description: "Fetch handoff requirement URL and build spec.override.md before native planning."
  after_specify:
    command: speckit.ai-team.handoff
    optional: true
    prompt: "Create an AI Team specify-to-plan handoff with role isolation?"
    description: "Preserve customer/product context as a document handoff before architecture planning."

tags:
  - ai-team
  - enterprise
  - sdd
  - governance
  - collaboration
  - memory
  - knowledge
  - evidence
  - code-graph
  - permissions
