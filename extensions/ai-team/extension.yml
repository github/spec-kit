schema_version: "1.0"

extension:
  id: ai-team
  name: "AI Team SDD Collaboration"
  version: "0.1.0"
  description: "Enterprise AI Team workflow for Spec-Driven Development with role-isolated handoffs, coding/enhancement repository boundaries, build-from-zero planning, self-test evidence, and failure evolution."
  author: AI Team Template
  repository: https://github.com/EuphoriaYan/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.12.4"
  commands:
    - speckit.specify
    - speckit.plan
    - speckit.tasks
    - speckit.implement

provides:
  commands:
    - name: speckit.ai-team.workspace
      file: commands/speckit.ai-team.workspace.md
      description: "Create or update the AI Team workspace contract for coding/enhancement repository roles and project privacy boundaries."
    - name: speckit.ai-team.handoff
      file: commands/speckit.ai-team.handoff.md
      description: "Create role-isolated SDD handoff records between specify, plan, tasks, and implementation roles."
    - name: speckit.ai-team.plan-gate
      file: commands/speckit.ai-team.plan-gate.md
      description: "Review the architecture plan gate for code graph impact, public plan safety, and build-from-zero readiness."
    - name: speckit.ai-team.task-gate
      file: commands/speckit.ai-team.task-gate.md
      description: "Review generated tasks for phase isolation, self-test mapping, existing-project impact, and new-project build-plan completeness."
    - name: speckit.ai-team.evidence
      file: commands/speckit.ai-team.evidence.md
      description: "Produce an Evidence Board after implementation and record self-test, scope, and failure-evolution follow-ups."
    - name: speckit.ai-team.support
      file: commands/speckit.ai-team.support.md
      description: "Audit and maintain the external Skill, Knowledge, and Memory support layers for AI Team SDD work."

  config:
    - name: ai-team-config.yml
      template: config-template.yml
      description: "AI Team repository roles, privacy boundaries, role isolation, and evidence settings."
      required: false

hooks:
  after_specify:
    command: speckit.ai-team.handoff
    optional: true
    prompt: "Create an AI Team specify-to-plan handoff with role isolation?"
    description: "Preserve customer/product context as a document handoff before architecture planning."
  after_plan:
    command: speckit.ai-team.plan-gate
    optional: true
    prompt: "Run the AI Team plan gate before task generation?"
    description: "Check architecture, code graph, public/private repository boundaries, and build-from-zero readiness."
  after_tasks:
    command: speckit.ai-team.task-gate
    optional: true
    prompt: "Run the AI Team task gate before implementation?"
    description: "Check task phases, self-test evidence, and strict build plan obligations."
  after_implement:
    command: speckit.ai-team.evidence
    optional: true
    prompt: "Generate the AI Team Evidence Board?"
    description: "Summarize implementation evidence, scope control, and failure-evolution follow-ups."

tags:
  - ai-team
  - enterprise
  - sdd
  - governance
  - collaboration
  - memory
  - knowledge
