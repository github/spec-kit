schema_version: "1.0"

extension:
  id: orchestrated
  name: "Orchestrated Implementation"
  version: "1.0.0"
  description: "Split implementation tasks into handoff shards and run speckit.implement for each shard"
  author: spec-kit-core
  repository: https://github.com/github/spec-kit
  license: MIT

requires:
  speckit_version: ">=0.8.9.dev0"

provides:
  commands:
    - name: speckit.orchestrated.implement
      file: commands/speckit.orchestrated.implement.md
      description: "Run implementation through workflow-generated handoff shards"

tags:
  - "orchestration"
  - "implementation"
  - "workflow"
