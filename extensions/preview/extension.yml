schema_version: "1.0"

extension:
  id: preview
  name: "Spec Kit Preview"
  version: "1.1.0"
  description: "Generate evidence-backed low, mid, or high fidelity previews from Spec Kit artifacts as Markdown or self-contained HTML"
  author: bigsmartben
  repository: https://github.com/bigsmartben/spec-kit-preview
  homepage: https://github.com/bigsmartben/spec-kit-preview
  license: MIT

requires:
  speckit_version: ">=0.8.10.dev0"

provides:
  commands:
    - name: speckit.preview.low-md
      file: commands/speckit.preview.low-md.md
      description: "Generate a low-fidelity evidence-backed Markdown wireflow preview"
    - name: speckit.preview.low-html
      file: commands/speckit.preview.low-html.md
      description: "Generate a low-fidelity evidence-backed static HTML wireflow preview"
    - name: speckit.preview.mid-md
      file: commands/speckit.preview.mid-md.md
      description: "Generate a mid-fidelity evidence-backed Markdown wireflow preview"
    - name: speckit.preview.mid-html
      file: commands/speckit.preview.mid-html.md
      description: "Generate a mid-fidelity evidence-backed static HTML wireflow preview"
    - name: speckit.preview.high-md
      file: commands/speckit.preview.high-md.md
      description: "Generate a high-fidelity evidence-backed Markdown interaction preview"
    - name: speckit.preview.high-html
      file: commands/speckit.preview.high-html.md
      description: "Generate a high-fidelity evidence-backed interactive HTML preview"

tags:
  - "preview"
  - "prototype"
  - "html"
  - "markdown"
  - "wireflow"
  - "ux"

