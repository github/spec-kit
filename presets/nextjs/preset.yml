schema_version: "1.0"

preset:
  id: "nextjs"
  name: "Next.js Web Application"
  version: "0.1.0"
  description: "State-of-the-art directives for full-stack Next.js (App Router + Route Handlers + DB): frontend, backend, security, performance, infrastructure, and TypeScript code quality. Behaviors only — no stack lock-in."
  author: "spec-kit"
  repository: "https://github.com/Satcomx00-x00/spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.6.0"

provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Next.js project constitution — phased, criticality-tagged behavioral directives for production web apps"
      replaces: "constitution-template"

    - type: "template"
      name: "agent-context"
      file: "templates/agent-context.md"
      description: "Compressed always-on agent rules for Next.js development; copy or reference from AGENTS.md / CLAUDE.md / .github/copilot-instructions.md"

    - type: "command"
      name: "speckit.constitution.scan"
      file: "commands/speckit.constitution.scan.md"
      description: "Scan the repo (Markdown docs + package.json + tsconfig + Next.js structure + tooling) and export a Next.js constitution at .specify/memory/constitution.md with a Sync Impact Report mapping evidence to directives."

    - type: "command"
      name: "speckit.audit"
      file: "commands/speckit.audit.md"
      description: "Audit the codebase against TypeScript and Next.js behavioral directives. Runs the audit script, summarizes findings by section and severity, and proposes prioritized fixes."

    - type: "command"
      name: "speckit.audit.deep"
      file: "commands/speckit.audit.deep.md"
      description: "Deep codebase audit: runs the regex audit, then layers tsc --noEmit, eslint, npm audit, and LLM-based file-level confirmation plus cross-file pattern analysis."

tags:
  - "nextjs"
  - "web"
  - "fullstack"
  - "typescript"
  - "production"
