schema_version: "1.0"

preset:
  id: "toc-navigation"
  name: "Table of Contents Navigation"
  version: "1.0.0"
  description: "Adds a navigable Table of Contents to generated spec.md, plan.md, and tasks.md documents"
  author: "Quratulain-bilal"
  repository: "https://github.com/github/spec-kit"
  license: "MIT"

requires:
  speckit_version: ">=0.4.0"

provides:
  templates:
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Spec template with Table of Contents section"
      replaces: "spec-template"

    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Plan template with Table of Contents section"
      replaces: "plan-template"

    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Tasks template with Table of Contents section"
      replaces: "tasks-template"

    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Specify command with TOC generation instructions"
      replaces: "speckit.specify"

    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Plan command with TOC generation instructions"
      replaces: "speckit.plan"

    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Tasks command with TOC generation instructions"
      replaces: "speckit.tasks"

tags:
  - "navigation"
  - "toc"
  - "documentation"
