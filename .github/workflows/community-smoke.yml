name: Community Bundle Smoke

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  init-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Build CLI wheel from checkout
        run: |
          set -euo pipefail
          uv build --wheel --out-dir /tmp/specify-community-smoke-dist
          ls -l /tmp/specify-community-smoke-dist/*.whl

      - name: Install CLI from built wheel
        run: |
          set -euo pipefail
          uv venv /tmp/specify-community-smoke-venv
          uv pip install --python /tmp/specify-community-smoke-venv/bin/python /tmp/specify-community-smoke-dist/*.whl

      - name: Verify bundled init defaults
        run: |
          set -euo pipefail
          project_dir="$(mktemp -d)"
          cd "$project_dir"
          /tmp/specify-community-smoke-venv/bin/specify init --here --integration claude --script sh --ignore-agent-tools

          test -f .specify/extensions/arch/extension.yml
          test -f .specify/extensions/preview/extension.yml
          test -f .specify/extensions/discovery/extension.yml
          test -f .specify/extensions/intake/extension.yml
          test -f .specify/extensions/repository-governance/extension.yml
          test -f .specify/presets/workflow-preset/preset.yml
          /tmp/specify-community-smoke-venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          import yaml

          manifest = yaml.safe_load(Path(".specify/presets/workflow-preset/preset.yml").read_text(encoding="utf-8"))
          registry = json.loads(Path(".specify/presets/.registry").read_text(encoding="utf-8"))
          manifest_version = manifest["preset"]["version"]
          registry_version = registry["presets"]["workflow-preset"]["version"]
          assert registry_version == manifest_version
          PY
          test -f .specify/presets/workflow-preset/templates/behavior/behavior-scenarios-draft.json
          test -f .specify/presets/workflow-preset/templates/behavior/behavior-testability-checklist.md
          test -f .specify/presets/workflow-preset/templates/behavior/bdd-draft.feature
          test -f .specify/presets/workflow-preset/templates/behavior/bdd-contract.feature
          test -f .specify/presets/workflow-preset/templates/behavior/uif-intent.json
          test -f .specify/presets/workflow-preset/templates/behavior/uif-expected.json
          test -f .specify/presets/workflow-preset/templates/behavior/scenario-instances.json
          test -f .specify/presets/workflow-preset/templates/behavior/data-fixtures-intent.json
          test -f .specify/presets/workflow-preset/templates/behavior/data-fixtures.json
          test -f .specify/presets/workflow-preset/templates/behavior/assertions.json
          test -f .specify/presets/workflow-preset/templates/constitution-template.md
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.scenarios.draft.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.uif.intent.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.data-fixtures.intent.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.uif.expected.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.scenario-instances.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.data-fixtures.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.behavior.assertions.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.design.visual-item-matrix.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.implement.manifest.v1.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.implement.handoff.v2.schema.json
          test -f .specify/presets/workflow-preset/schemas/speckit.implement.receipt.v1.schema.json
          test -f .specify/presets/workflow-preset/.composed/speckit.specify.md
          test -f .specify/presets/workflow-preset/.composed/speckit.clarify.md
          test -f .specify/presets/workflow-preset/.composed/speckit.checklist.md
          test -f .specify/presets/workflow-preset/.composed/speckit.constitution.md
          test -f .specify/presets/workflow-preset/.composed/speckit.analyze.md
          test -f .specify/presets/workflow-preset/.composed/speckit.plan.md
          test -f .specify/presets/workflow-preset/.composed/speckit.tasks.md

          for arch_skill in \
            speckit-arch-scenario-generate \
            speckit-arch-logical-generate \
            speckit-arch-process-generate \
            speckit-arch-development-generate \
            speckit-arch-physical-generate \
            speckit-arch-scenario-reverse \
            speckit-arch-logical-reverse \
            speckit-arch-process-reverse \
            speckit-arch-development-reverse \
            speckit-arch-physical-reverse; do
            test -f ".claude/skills/$arch_skill/SKILL.md"
          done
          for preview_skill in \
            speckit-preview-low-md \
            speckit-preview-low-html \
            speckit-preview-mid-md \
            speckit-preview-mid-html \
            speckit-preview-high-md \
            speckit-preview-high-html; do
            test -f ".claude/skills/$preview_skill/SKILL.md"
          done
          test -f .claude/skills/speckit-discovery-feasibility/SKILL.md
          test -f .claude/skills/speckit-intake-visual-design/SKILL.md
          test -f .claude/skills/speckit-intake-prd/SKILL.md
          test -f .claude/skills/speckit-intake-test-cases/SKILL.md
          test -f .claude/skills/speckit-repository-governance-generate/SKILL.md
          test -f .claude/skills/speckit-specify/SKILL.md
          test -f .claude/skills/speckit-clarify/SKILL.md
          test -f .claude/skills/speckit-checklist/SKILL.md
          test -f .claude/skills/speckit-constitution/SKILL.md
          test -f .claude/skills/speckit-analyze/SKILL.md
          test -f .claude/skills/speckit-plan/SKILL.md
          test -f .claude/skills/speckit-tasks/SKILL.md
          test -f .claude/skills/speckit-implement/SKILL.md

          grep -q "Change Scope Granularity" .claude/skills/speckit-constitution/SKILL.md
          grep -q "Phase 0 Behavior Projection" .claude/skills/speckit-plan/SKILL.md
          grep -q "Validation Task Derivation" .claude/skills/speckit-tasks/SKILL.md
          grep -q "Core Agent" .claude/skills/speckit-implement/SKILL.md
          grep -q "Vertical Planner Agent" .claude/skills/speckit-implement/SKILL.md
          grep -q "Worker Agent" .claude/skills/speckit-implement/SKILL.md

          for extension_id in arch discovery intake preview repository-governance; do
            /tmp/specify-community-smoke-venv/bin/specify extension remove "$extension_id" --force
            test ! -d ".specify/extensions/$extension_id"
            case "$extension_id" in
              arch)
                test "$(find .claude/skills -maxdepth 1 -type d -name 'speckit-arch-*' | wc -l)" -eq 0
                ;;
              preview)
                for preview_skill in \
                  speckit-preview-low-md \
                  speckit-preview-low-html \
                  speckit-preview-mid-md \
                  speckit-preview-mid-html \
                  speckit-preview-high-md \
                  speckit-preview-high-html; do
                  test ! -d ".claude/skills/$preview_skill"
                done
                ;;
              discovery)
                test "$(find .claude/skills -maxdepth 1 -type d -name 'speckit-discovery-*' | wc -l)" -eq 0
                ;;
              intake)
                test "$(find .claude/skills -maxdepth 1 -type d -name 'speckit-intake-*' | wc -l)" -eq 0
                ;;
              repository-governance)
                test ! -d .claude/skills/speckit-repository-governance-generate
                ;;
            esac
          done

          for extension_id in arch discovery intake preview repository-governance; do
            /tmp/specify-community-smoke-venv/bin/specify extension add "$GITHUB_WORKSPACE/extensions/$extension_id" --dev
            case "$extension_id" in
              arch)
                test -f .claude/skills/speckit-arch-scenario-generate/SKILL.md
                test -f .claude/skills/speckit-arch-scenario-reverse/SKILL.md
                grep -q "scenario view" .claude/skills/speckit-arch-scenario-generate/SKILL.md
                ;;
              preview)
                for preview_skill in \
                  speckit-preview-low-md \
                  speckit-preview-low-html \
                  speckit-preview-mid-md \
                  speckit-preview-mid-html \
                  speckit-preview-high-md \
                  speckit-preview-high-html; do
                  test -f ".claude/skills/$preview_skill/SKILL.md"
                  grep -q "evidence-backed" ".claude/skills/$preview_skill/SKILL.md"
                done
                ;;
              discovery)
                test -f .claude/skills/speckit-discovery-feasibility/SKILL.md
                grep -q "evidence-backed feasibility study" .claude/skills/speckit-discovery-feasibility/SKILL.md
                ;;
              intake)
                test -f .claude/skills/speckit-intake-visual-design/SKILL.md
                test -f .claude/skills/speckit-intake-prd/SKILL.md
                test -f .claude/skills/speckit-intake-test-cases/SKILL.md
                grep -q "visual design intake" .claude/skills/speckit-intake-visual-design/SKILL.md
                ;;
              repository-governance)
                test -f .claude/skills/speckit-repository-governance-generate/SKILL.md
                grep -q "Project Governance Projection Generation" .claude/skills/speckit-repository-governance-generate/SKILL.md
                ;;
            esac
          done

          /tmp/specify-community-smoke-venv/bin/specify extension remove discovery --force
          /tmp/specify-community-smoke-venv/bin/specify extension add discovery
          test -f .claude/skills/speckit-discovery-feasibility/SKILL.md
          test -f .claude/skills/speckit-discovery-decision/SKILL.md

          /tmp/specify-community-smoke-venv/bin/specify preset resolve plan-template | tee resolve-plan-template.txt
          grep -q "workflow-preset" resolve-plan-template.txt
          grep -q "Composition chain" resolve-plan-template.txt
