schema_version: "1.0"

agent:
  id: "cursor-agent"
  name: "Cursor"
  version: "1.0.0"
  description: "Cursor IDE for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: false

requires:
  speckit_version: ">=0.1.0"

tags: ['ide', 'cursor']

command_registration:
  commands_dir: ".cursor/commands"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
