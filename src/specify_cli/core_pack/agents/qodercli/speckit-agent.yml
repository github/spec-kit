schema_version: "1.0"

agent:
  id: "qodercli"
  name: "Qoder CLI"
  version: "1.0.0"
  description: "Qoder CLI for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: true
  install_url: "https://qoder.com/cli"
  cli_tool: "qodercli"

requires:
  speckit_version: ">=0.1.0"

tags: ['cli', 'qoder']

command_registration:
  commands_dir: ".qoder/commands"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
