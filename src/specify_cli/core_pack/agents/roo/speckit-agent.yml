schema_version: "1.0"

agent:
  id: "roo"
  name: "Roo Code"
  version: "1.0.0"
  description: "Roo Code IDE for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: false

requires:
  speckit_version: ">=0.1.0"

tags: ['ide', 'roo']

command_registration:
  commands_dir: ".roo/commands"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
