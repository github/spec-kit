schema_version: "1.0"

agent:
  id: "bob"
  name: "IBM Bob"
  version: "1.0.0"
  description: "IBM Bob IDE for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: false

requires:
  speckit_version: ">=0.1.0"

tags: ['ide', 'ibm', 'bob']

command_registration:
  commands_dir: ".bob/commands"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
