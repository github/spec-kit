schema_version: "1.0"

agent:
  id: "kilocode"
  name: "Kilo Code"
  version: "1.0.0"
  description: "Kilo Code IDE for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: false

requires:
  speckit_version: ">=0.1.0"

tags: ['ide', 'kilocode']

command_registration:
  commands_dir: ".kilocode/workflows"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
