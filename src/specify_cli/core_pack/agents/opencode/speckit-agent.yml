schema_version: "1.0"

agent:
  id: "opencode"
  name: "opencode"
  version: "1.0.0"
  description: "opencode CLI for AI-assisted development"
  author: "github"
  license: "MIT"

runtime:
  requires_cli: true
  install_url: "https://opencode.ai"
  cli_tool: "opencode"

requires:
  speckit_version: ">=0.1.0"

tags: ['cli', 'opencode']

command_registration:
  commands_dir: ".opencode/command"
  format: "markdown"
  arg_placeholder: "$ARGUMENTS"
  file_extension: ".md"
